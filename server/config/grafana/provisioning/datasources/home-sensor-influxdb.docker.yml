apiVersion: 1

datasources:
  - name: Home Sensor InfluxDB
    uid: home-sensor-influxdb
    type: influxdb
    access: proxy
    url: ${INFLUXDB_URL}
    isDefault: true
    editable: false
    jsonData:
      version: Flux
      organization: ${INFLUXDB_ORG}
      defaultBucket: ${INFLUXDB_BUCKET}
      tlsSkipVerify: false
    secureJsonData:
      token: ${INFLUXDB_READ_TOKEN}
