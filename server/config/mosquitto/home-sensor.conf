# Home Sensor Mosquitto configuration.
#
# Install path on Raspberry Pi:
#   /etc/mosquitto/conf.d/home-sensor.conf
#
# This listener must be reachable by the ESP32 gateway on the local network.
# Do not expose port 1883 directly to the public internet.

per_listener_settings false

listener 1883 0.0.0.0
allow_anonymous false
password_file /etc/mosquitto/passwd
acl_file /etc/mosquitto/acl.d/home-sensor.acl

# Persistence is configured by the Raspberry Pi OS Mosquitto base config.

connection_messages true
log_dest syslog
log_type error
log_type warning
log_type notice
log_type information
