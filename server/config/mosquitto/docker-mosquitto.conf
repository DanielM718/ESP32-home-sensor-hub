# Mosquitto configuration for the optional Docker Compose mirror.
# Native Raspberry Pi deployment uses home-sensor.conf instead.

listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config-runtime/passwd
acl_file /mosquitto/config/home-sensor.acl

persistence true
persistence_location /mosquitto/data/

connection_messages true
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
